<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .coming-soon {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Year Echo</h1>
        <p class="subtitle">岁月回声，静待花开</p>
        <div class="coming-soon">🚀 Email  huashengjiang258@outlook.conm · Coming Soon</div>
        <div class="footer">
            &copy; <span id="year"></span> Year Echo • All rights reserved
        </div>
    </div>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
